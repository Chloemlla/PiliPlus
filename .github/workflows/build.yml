name: Build

on:
  push:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      build_android:
        description: "Build Android"
        required: false
        default: true
        type: boolean

      build_ios:
        description: "Build iOS"
        required: false
        default: true
        type: boolean

      build_mac:
        description: "Build Mac"
        required: false
        default: true
        type: boolean

      build_win_x64:
        description: "Build Win-x64"
        required: false
        default: true
        type: boolean

      build_linux_x64:
        description: "Build Linux-x64"
        required: false
        default: true
        type: boolean

      tag:
        description: "tag"
        required: false
        default: ""
        type: string

jobs:
  quality:
    name: Analyze and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Secret scan
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -Ei '\.(jks|keystore|p12|pfx|pem)$'; then
            echo "::error::tracked signing material detected"
            exit 1
          fi
          cookie_names='(SESSDATA|bili_jct)'
          separator='='
          token_pattern='(access[_-]?key|refresh[_-]?token)[[:space:]]*[:=][[:space:]]*"?[A-Za-z0-9_=-]{20,}'
          private_key_prefix='BEGIN '
          private_key_pattern="${private_key_prefix}(RSA|OPENSSH|EC|DSA|PRIVATE) KEY"
          if git grep -nEI "(${private_key_pattern}|${cookie_names}${separator}|${token_pattern})" -- . ':!pubspec.lock' ':!test/**' ':!*audit-report*.md'; then
            echo "::error::possible committed secret detected"
            exit 1
          fi

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  android:
    name: Release Android
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.repository == 'Chloemlla/PiliPlus') || github.event.inputs.build_android == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"
          cache-dependency-path: |
            android/*.gradle*
            android/**/*.gradle*
            android/**/gradle-wrapper.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a
        with:
          gradle-version: "9.5.0"

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        id: flutter-action
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Apply Patch
        shell: pwsh
        run: lib/scripts/patch.ps1 android

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
        shell: bash

      - name: Set release metadata
        shell: pwsh
        run: |
          $versionLine = Get-Content -Path pubspec.yaml -Encoding UTF8 |
            Where-Object { $_ -match '^\s*version:' } |
            Select-Object -First 1

          if (-not $versionLine) {
            Write-Error 'pubspec.yaml version not found'
            exit 1
          }

          if ($versionLine -notmatch '^\s*version:\s*([^\+\s]+)') {
            Write-Error "pubspec.yaml version is invalid: $versionLine"
            exit 1
          }

          $versionName = $Matches[1]
          $shortHash = (git rev-parse --short=9 HEAD).Trim()

          Add-Content -Path $env:GITHUB_ENV -Value "pilipili_VERSION_NAME=$versionName"
          Add-Content -Path $env:GITHUB_ENV -Value "pilipili_SHORT_HASH=$shortHash"

      - name: Write key
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          for var in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::$var is not set"
              exit 1
            fi
          done

          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/app/key.jks
          {
            echo "storeFile=key.jks"
            printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
          } > android/key.properties

      - name: Set and Extract version
        shell: pwsh
        run: lib/scripts/build.ps1 android

      - name: Generate Baseline Profile
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: |
            set -euo pipefail
            DART_DEFINES=$(jq -r 'to_entries | map("\(.key)=\(.value | tostring)" | @base64) | join(",")' pili_release.json)
            gradle -p android -Pdart-defines="$DART_DEFINES" :app:generateBaselineProfile --no-daemon --stacktrace

            baseline_profile_dir=android/app/src/main/generated/baselineProfiles
            baseline_profile="$baseline_profile_dir/baseline-prof.txt"
            startup_profile="$baseline_profile_dir/startup-prof.txt"

            for generated_profile in "$baseline_profile" "$startup_profile"; do
              if [ ! -s "$generated_profile" ]; then
                echo "::error::Missing generated profile: $generated_profile"
                find "$baseline_profile_dir" -maxdepth 1 -type f -print || true
                exit 1
              fi
            done

            {
              echo "### Baseline profile"
              wc -l "$baseline_profile" "$startup_profile"
            } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Baseline Profile
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          archive: false
          name: Android_baseline_profile
          path: |
            android/app/src/main/generated/baselineProfiles/baseline-prof.txt
            android/app/src/main/generated/baselineProfiles/startup-prof.txt

      - name: Flutter Build Release Apk
        run: flutter build apk --release --split-per-abi --dart-define-from-file=pili_release.json --no-pub

      - name: Rename
        run: |
          shopt -s nullglob
          apk_files=(build/app/outputs/flutter-apk/app-*-release.apk)
          if [ ${#apk_files[@]} -eq 0 ]; then
            echo "::error::No release APKs found in build/app/outputs/flutter-apk"
            exit 1
          fi

          for file in "${apk_files[@]}"; do
            abi=$(echo "$file" | sed -E 's|.*app-(.*)-release\.apk|\1|')
            mv "$file" "PiliPlus_android_${{ env.version }}_${abi}.apk"
          done
        shell: bash

      - name: Automatic release
        if: success() && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          make_latest: true
          generate_release_notes: true
          tag_name: "v${{ env.pilipili_VERSION_NAME }}-${{ env.pilipili_SHORT_HASH }}"
          prerelease: false
          name: "PiliPlus-android ${{ env.pilipili_VERSION_NAME }}-${{ env.pilipili_SHORT_HASH }}"
          files: PiliPlus_android_*.apk

      - name: Upload Android arm64-v8a
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          archive: false
          name: Android_arm64-v8a
          path: PiliPlus_android_*_arm64-v8a.apk

      - name: Upload Android armeabi-v7a
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          archive: false
          name: Android_armeabi-v7a
          path: PiliPlus_android_*_armeabi-v7a.apk

      - name: Upload Android x86_64
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          archive: false
          name: Android_x86_64
          path: PiliPlus_android_*_x86_64.apk

  ios:
    needs: quality
    if: ${{ (github.event_name == 'pull_request' && github.repository == 'Chloemlla/PiliPlus') || github.event.inputs.build_ios == 'true' }}
    uses: ./.github/workflows/ios.yml
    permissions:
      contents: write
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

  mac:
    needs: quality
    if: ${{ github.event.inputs.build_mac == 'true' }}
    uses: ./.github/workflows/mac.yml
    permissions:
      contents: write
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

  win_x64:
    needs: quality
    if: ${{ (github.event_name == 'pull_request' && github.repository == 'Chloemlla/PiliPlus') || github.event.inputs.build_win_x64 == 'true' }}
    uses: ./.github/workflows/win_x64.yml
    permissions:
      contents: write
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

  linux_x64:
    needs: quality
    if: ${{ github.event.inputs.build_linux_x64 == 'true' }}
    uses: ./.github/workflows/linux_x64.yml
    permissions:
      contents: write
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}
