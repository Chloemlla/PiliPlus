name: Build

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      build_android:
        description: "Build Android"
        required: false
        default: true
        type: boolean

      build_ios:
        description: "Build iOS"
        required: false
        default: true
        type: boolean

      build_mac:
        description: "Build Mac"
        required: false
        default: true
        type: boolean

      build_win_x64:
        description: "Build Win-x64"
        required: false
        default: true
        type: boolean

      build_linux_x64:
        description: "Build Linux-x64"
        required: false
        default: true
        type: boolean

      tag:
        description: "tag"
        required: false
        default: ""
        type: string

jobs:
  quality:
    name: Analyze and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 代码迁出
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: 安装Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Secret scan
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -Ei '\.(jks|keystore|p12|pfx|pem)$'; then
            echo "::error::tracked signing material detected"
            exit 1
          fi
          if git grep -nEI '(BEGIN (RSA|OPENSSH|EC|DSA|PRIVATE) KEY|SESSDATA=|bili_jct=|access[_-]?key[[:space:]]*[:=][[:space:]]*"?[A-Za-z0-9_=-]{20,}|refresh[_-]?token[[:space:]]*[:=][[:space:]]*"?[A-Za-z0-9_=-]{20,})' -- . ':!pubspec.lock'; then
            echo "::error::possible committed secret detected"
            exit 1
          fi

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  android:
    needs: quality
    if: ${{ (github.event_name == 'pull_request' && github.repository == 'Chloemlla/PiliPlus') || github.event.inputs.build_android == 'true' }}
    name: Release Android
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 代码迁出
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: 构建Java环境
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"
          cache-dependency-path: |
            android/*.gradle*
            android/**/gradle-wrapper.properties

      - name: 安装Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        id: flutter-action
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Apply Patch
        shell: pwsh
        run: lib/scripts/patch.ps1 android

      - name: Write key
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          for var in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::$var is not set"
              exit 1
            fi
          done

          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/app/key.jks
          {
            echo "storeFile=key.jks"
            printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
          } > android/key.properties

      - name: Set and Extract version
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: pwsh
        run: lib/scripts/build.ps1 android

      - name: Flutter Build Release Apk
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: flutter build apk --release --split-per-abi --dart-define-from-file=pili_release.json --pub

      - name: Flutter Build Dev Apk
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          flutter build apk --release --split-per-abi --android-project-arg dev=1 --pub

      - name: Rename
        run: |
          for file in build/app/outputs/flutter-apk/app-*-release.apk; do
            abi=$(echo "$file" | sed -E 's|.*app-(.*)-release\.apk|\1|')
            mv "$file" "PiliPlus_android_${{ env.version }}_${abi}.apk"
          done
        shell: bash

      - name: Release
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          files: PiliPlus_android_*.apk

      - name: 上传
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          archive: false
          name: Android_arm64-v8a
          path: PiliPlus_android_*_arm64-v8a.apk

      - name: 上传
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          archive: false
          name: Android_armeabi-v7a
          path: PiliPlus_android_*_armeabi-v7a.apk

      - name: 上传
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          archive: false
          name: Android_x86_64
          path: PiliPlus_android_*_x86_64.apk

  ios:
    needs: quality
    if: ${{ (github.event_name == 'pull_request' && github.repository == 'Chloemlla/PiliPlus') || github.event.inputs.build_ios == 'true' }}
    uses: ./.github/workflows/ios.yml
    permissions:
      contents: write
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

  mac:
    needs: quality
    if: ${{ github.event.inputs.build_mac == 'true' }}
    uses: ./.github/workflows/mac.yml
    permissions:
      contents: write
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

  win_x64:
    needs: quality
    if: ${{ (github.event_name == 'pull_request' && github.repository == 'Chloemlla/PiliPlus') || github.event.inputs.build_win_x64 == 'true' }}
    uses: ./.github/workflows/win_x64.yml
    permissions:
      contents: write
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

  linux_x64:
    needs: quality
    if: ${{ github.event.inputs.build_linux_x64 == 'true' }}
    uses: ./.github/workflows/linux_x64.yml
    permissions:
      contents: write
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}
